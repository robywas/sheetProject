<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        color: #202124;
      }
      .card {
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .card .label {
        font-size: 12px;
        color: #5f6368;
      }
      .card .value {
        font-size: 24px;
        font-weight: 700;
        margin-top: 3px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: #1a73e8;
        color: #fff;
        padding: 10px;
        margin-top: 8px;
        cursor: pointer;
      }
      button.secondary {
        background: #5f6368;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #5f6368;
      }
      #error {
        color: #b31412;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>Panel pracownika</h3>
    <div id="user" class="card">
      <div class="label">Uzytkownik</div>
      <div class="value" style="font-size:14px;">Ladowanie...</div>
    </div>
    <div class="card">
      <div class="label">Otwarte zadania</div>
      <div id="openTasks" class="value">0</div>
    </div>
    <div class="card">
      <div class="label">Przeterminowane</div>
      <div id="overdueTasks" class="value">0</div>
    </div>
    <div class="card">
      <div class="label">Termin <= 7 dni</div>
      <div id="dueSoonTasks" class="value">0</div>
    </div>
    <div id="error"></div>
    <button onclick="refreshMyTasks()">Odswiez moj widok zadan</button>
    <button class="secondary" onclick="reloadSummary()">Odswiez podsumowanie</button>
    <div id="status"></div>

    <script>
      function renderSummary(summary) {
        document.getElementById('user').querySelector('.value').textContent =
          summary.employeeName || summary.email || '(brak emaila)';
        document.getElementById('openTasks').textContent = summary.openTasks || 0;
        document.getElementById('overdueTasks').textContent = summary.overdueTasks || 0;
        document.getElementById('dueSoonTasks').textContent = summary.dueSoonTasks || 0;
        document.getElementById('error').textContent = summary.error || '';
      }

      function setStatus(text) {
        document.getElementById('status').textContent = text || '';
      }

      function handleError(err) {
        const msg = err && err.message ? err.message : String(err);
        document.getElementById('error').textContent = msg;
        setStatus('');
      }

      function reloadSummary() {
        setStatus('Odswiezam...');
        google.script.run
          .withSuccessHandler(function (summary) {
            renderSummary(summary);
            setStatus('Gotowe.');
          })
          .withFailureHandler(handleError)
          .getWorkerSummary();
      }

      function refreshMyTasks() {
        setStatus('Odswiezam widok zadan...');
        google.script.run
          .withSuccessHandler(function () {
            reloadSummary();
            setStatus('Widok pracownika odswiezony.');
          })
          .withFailureHandler(handleError)
          .refreshMyTasksView();
      }

      reloadSummary();
    </script>
  </body>
</html>
