<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        color: #202124;
      }
      .kpi {
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .label {
        color: #5f6368;
        font-size: 13px;
      }
      .value {
        font-size: 22px;
        font-weight: 700;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        background: #1a73e8;
        color: #fff;
        padding: 10px;
        margin-top: 8px;
        cursor: pointer;
      }
      button.secondary {
        background: #188038;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #5f6368;
      }
      #error {
        color: #b31412;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>Panel managera</h3>

    <div class="kpi">
      <div class="label">Otwarte zadania</div>
      <div id="openTasks" class="value">0</div>
    </div>
    <div class="kpi">
      <div class="label">Przeterminowane</div>
      <div id="overdueTasks" class="value">0</div>
    </div>
    <div class="kpi">
      <div class="label">Termin <= 7 dni</div>
      <div id="dueSoonTasks" class="value">0</div>
    </div>

    <div id="error"></div>
    <button onclick="generateTasks()">Generuj zadania (30 dni)</button>
    <button class="secondary" onclick="refreshDashboard()">Odswiez dashboard</button>
    <button onclick="loadSummary()">Odswiez podsumowanie</button>
    <div id="status"></div>

    <script>
      function setStatus(text) {
        document.getElementById('status').textContent = text || '';
      }

      function renderSummary(summary) {
        document.getElementById('openTasks').textContent = summary.openTasks || 0;
        document.getElementById('overdueTasks').textContent = summary.overdueTasks || 0;
        document.getElementById('dueSoonTasks').textContent = summary.dueSoonTasks || 0;
      }

      function handleError(err) {
        const msg = err && err.message ? err.message : String(err);
        document.getElementById('error').textContent = msg;
        setStatus('');
      }

      function loadSummary() {
        setStatus('Pobieram podsumowanie...');
        document.getElementById('error').textContent = '';
        google.script.run
          .withSuccessHandler(function (summary) {
            renderSummary(summary);
            setStatus('Gotowe.');
          })
          .withFailureHandler(handleError)
          .getManagerSummary();
      }

      function refreshDashboard() {
        setStatus('Odswiezam dashboard...');
        document.getElementById('error').textContent = '';
        google.script.run
          .withSuccessHandler(function () {
            setStatus('Dashboard odswiezony.');
            loadSummary();
          })
          .withFailureHandler(handleError)
          .refreshManagerDashboard();
      }

      function generateTasks() {
        setStatus('Generuje zadania...');
        document.getElementById('error').textContent = '';
        google.script.run
          .withSuccessHandler(function () {
            setStatus('Zadania wygenerowane.');
            loadSummary();
          })
          .withFailureHandler(handleError)
          .generateTasks30Days();
      }

      loadSummary();
    </script>
  </body>
</html>
